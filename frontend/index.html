<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloud AI App - COE 558</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e3a8a, #1e40af);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    header h1 { font-size: 1.6rem; font-weight: 700; color: #fff; }
    header span { font-size: 0.9rem; color: #93c5fd; }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* ===== WEATHER SECTION ===== */
    .weather-card {
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .weather-card h2 { font-size: 1.2rem; color: #93c5fd; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    .weather-search {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .weather-search input {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #3b82f6;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    .weather-search input::placeholder { color: #94a3b8; }

    .btn {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn:hover { transform: translateY(-1px); opacity: 0.9; }
    .btn:active { transform: translateY(0); }

    .btn-blue { background: #3b82f6; color: #fff; }
    .btn-green { background: #10b981; color: #fff; }
    .btn-purple { background: #8b5cf6; color: #fff; }
    .btn-red { background: #ef4444; color: #fff; }
    .btn-gray { background: #475569; color: #fff; }

    .weather-display {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .weather-icon img { width: 80px; height: 80px; }
    .weather-icon .condition-emoji { font-size: 70px; line-height: 1; }

    .weather-info h3 { font-size: 2.5rem; font-weight: 800; color: #fff; }
    .weather-info .location { font-size: 1rem; color: #93c5fd; margin-bottom: 6px; }
    .weather-info .condition-text { font-size: 1.1rem; color: #bfdbfe; }
    .weather-info .details { display: flex; gap: 20px; margin-top: 10px; font-size: 0.9rem; color: #94a3b8; }

    .temp-toggle {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .temp-toggle button {
      padding: 8px 16px;
      border-radius: 8px;
      border: 2px solid #3b82f6;
      background: transparent;
      color: #93c5fd;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .temp-toggle button.active { background: #3b82f6; color: #fff; }

    #map { height: 250px; border-radius: 14px; margin-top: 20px; overflow: hidden; }

    /* ===== GENAI SECTION ===== */
    .genai-card {
      background: #1e293b;
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid #334155;
    }

    .genai-card h2 { font-size: 1.2rem; color: #a78bfa; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    .prompt-area {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .prompt-area textarea {
      flex: 1;
      min-width: 250px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
      font-family: inherit;
    }

    .prompt-area textarea:focus { border-color: #8b5cf6; }

    .genai-result {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    #generated-image {
      max-width: 400px;
      width: 100%;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      display: none;
    }

    .result-actions { display: flex; flex-direction: column; gap: 10px; }

    /* ===== HISTORY SECTION ===== */
    .history-card {
      background: #1e293b;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid #334155;
    }

    .history-card h2 { font-size: 1.2rem; color: #34d399; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .history-item {
      background: #0f172a;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #334155;
      transition: transform 0.2s;
    }

    .history-item:hover { transform: translateY(-3px); }
    .history-item img { width: 100%; height: 160px; object-fit: cover; }

    .history-item .no-img {
      width: 100%;
      height: 160px;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .history-item-info { padding: 12px; }
    .history-item-info p { font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; line-height: 1.4; }
    .history-item-info .date { font-size: 0.75rem; color: #64748b; }
    .history-item-info button { font-size: 0.8rem; padding: 6px 12px; }

    /* ===== LOADER ===== */
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-msg {
      padding: 12px 16px;
      border-radius: 10px;
      margin-top: 12px;
      font-size: 0.9rem;
      display: none;
    }

    .status-msg.success { background: rgba(16,185,129,0.15); border: 1px solid #10b981; color: #6ee7b7; display: block; }
    .status-msg.error { background: rgba(239,68,68,0.15); border: 1px solid #ef4444; color: #fca5a5; display: block; }
    .status-msg.info { background: rgba(59,130,246,0.15); border: 1px solid #3b82f6; color: #93c5fd; display: block; }

    .empty-state { text-align: center; padding: 40px; color: #64748b; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

    @media (max-width: 600px) {
      .weather-display { flex-direction: column; }
      .temp-toggle { margin-left: 0; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>☁️ Cloud AI App</h1>
    <span>COE 558 - Cloud & Edge Computing | KFUPM</span>
  </div>
</header>

<div class="container">

  <!-- ===== WEATHER SECTION ===== -->
  <div class="weather-card">
    <h2>🌤️ Weather Service (S1)</h2>

    <div class="weather-search">
      <input type="text" id="city-input" placeholder="Search for a city... (e.g. Riyadh)" onkeydown="if(event.key==='Enter') searchCity()"/>
      <button class="btn btn-blue" onclick="searchCity()">Search</button>
      <button class="btn btn-green" onclick="getLocationWeather()">📍 My Location</button>
    </div>

    <div id="weather-content">
      <div class="empty-state"><div class="icon">🌍</div><p>Search for a city or use your location</p></div>
    </div>

    <div id="map"></div>
  </div>

  <!-- ===== GENAI SECTION ===== -->
  <div class="genai-card">
    <h2>🎨 AI Image Generator (S2)</h2>

    <div class="prompt-area">
      <textarea id="prompt-input" placeholder="Describe the image you want to generate...&#10;e.g. A futuristic city at night with glowing neon lights"></textarea>
      <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="btn btn-purple" onclick="generateImage()" id="gen-btn" style="height:fit-content">✨ Generate</button>
      </div>
    </div>

    <div id="gen-status" class="status-msg"></div>

    <div class="genai-result">
      <img id="generated-image" alt="Generated image"/>
      <div class="result-actions" id="result-actions" style="display:none">
        <button class="btn btn-green" onclick="saveResult()">💾 Save to History</button>
        <div id="save-status" class="status-msg"></div>
      </div>
    </div>
  </div>

  <!-- ===== HISTORY SECTION ===== -->
  <div class="history-card">
    <h2>📚 Saved History (S3)</h2>
    <button class="btn btn-blue" onclick="loadHistory()" style="margin-bottom:8px">🔄 Refresh</button>
    <div id="history-status" class="status-msg"></div>
    <div id="history-grid" class="history-grid"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ===== CONFIG =====
  const GW = 'https://cloud-ai-gateway-2aslucyl.uc.gateway.dev';
  const S1 = GW;
  const S2 = GW;
  const S3 = GW;

  // ===== STATE =====
  let currentTempC = null;
  let currentTempF = null;
  let isCelsius = true;
  let currentImageBase64 = null;
  let currentPrompt = null;
  let map = null;
  let marker = null;

  // ===== MAP INIT =====
  function initMap(lat = 24.7, lon = 46.7) {
    if (!map) {
      map = L.map('map').setView([lat, lon], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);
      map.on('click', (e) => fetchWeather(null, e.latlng.lat, e.latlng.lng));
    } else {
      map.setView([lat, lon], 8);
    }
    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lon]).addTo(map);
  }

  // ===== WEATHER =====
  function getConditionEmoji(code, isDay) {
    if (code === 1000) return isDay ? '☀️' : '🌙';
    if ([1003, 1006].includes(code)) return isDay ? '⛅' : '🌥️';
    if ([1009].includes(code)) return '☁️';
    if ([1030, 1135, 1147].includes(code)) return '🌫️';
    if ([1063, 1150, 1153, 1180, 1183].includes(code)) return '🌦️';
    if ([1186, 1189, 1192, 1195, 1240, 1243, 1246].includes(code)) return '🌧️';
    if ([1066, 1210, 1213, 1216, 1219, 1255, 1258].includes(code)) return '🌨️';
    if ([1087, 1273, 1276].includes(code)) return '⛈️';
    return '🌡️';
  }

  function renderWeather(data) {
    currentTempC = data.weather.temp_c;
    currentTempF = data.weather.temp_f;
    const emoji = getConditionEmoji(data.weather.condition.code, data.weather.is_day);

    document.getElementById('weather-content').innerHTML = `
      <div class="weather-display">
        <div class="weather-icon">
          <div class="condition-emoji">${emoji}</div>
        </div>
        <div class="weather-info">
          <div class="location">📍 ${data.location.name}, ${data.location.country}</div>
          <h3 id="temp-display">${isCelsius ? currentTempC + '°C' : currentTempF + '°F'}</h3>
          <div class="condition-text">${data.weather.condition.text}</div>
          <div class="details">
            <span>💧 ${data.weather.humidity}%</span>
            <span>💨 ${data.weather.wind_kph} km/h ${data.weather.wind_dir}</span>
            <span>🌡️ Feels like ${isCelsius ? data.weather.feels_like_c + '°C' : data.weather.feels_like_f + '°F'}</span>
          </div>
        </div>
        <div class="temp-toggle">
          <button onclick="setUnit('c')" id="btn-c" class="${isCelsius ? 'active' : ''}">°C</button>
          <button onclick="setUnit('f')" id="btn-f" class="${!isCelsius ? 'active' : ''}">°F</button>
        </div>
      </div>
    `;
    initMap(data.location.lat, data.location.lon);
  }

  function setUnit(unit) {
    isCelsius = (unit === 'c');
    const t = document.getElementById('temp-display');
    if (t) t.textContent = isCelsius ? currentTempC + '°C' : currentTempF + '°F';
    document.getElementById('btn-c').className = isCelsius ? 'active' : '';
    document.getElementById('btn-f').className = !isCelsius ? 'active' : '';
  }

  async function fetchWeather(city, lat, lon) {
    const content = document.getElementById('weather-content');
    content.innerHTML = '<div class="empty-state"><span class="loader"></span> Loading weather...</div>';
    try {
      let url = S1 + '/weather?';
      if (city) url += `city=${encodeURIComponent(city)}`;
      else if (lat && lon) url += `lat=${lat}&lon=${lon}`;
      else url += 'ip=auto';

      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');
      renderWeather(data);
    } catch (e) {
      content.innerHTML = `<div class="status-msg error" style="display:block">❌ ${e.message}</div>`;
    }
  }

  function searchCity() {
    const city = document.getElementById('city-input').value.trim();
    if (!city) return;
    fetchWeather(city);
  }

  function getLocationWeather() {
    if (!navigator.geolocation) return fetchWeather(null, null, null);
    navigator.geolocation.getCurrentPosition(
      (pos) => fetchWeather(null, pos.coords.latitude, pos.coords.longitude),
      () => fetchWeather(null, null, null)
    );
  }

  // ===== GENAI =====
  function showStatus(id, type, msg) {
    const el = document.getElementById(id);
    el.className = `status-msg ${type}`;
    el.textContent = msg;
  }

  async function generateImage() {
    const prompt = document.getElementById('prompt-input').value.trim();
    if (!prompt) return showStatus('gen-status', 'error', '⚠️ Please enter a prompt first');

    const btn = document.getElementById('gen-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> Generating...';
    document.getElementById('generated-image').style.display = 'none';
    document.getElementById('result-actions').style.display = 'none';
    showStatus('gen-status', 'info', '⏳ Generating image, please wait...');

    try {
      const res = await fetch(S2 + '/genai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      if (!res.ok || !data.image) throw new Error(data.error || 'Generation failed');

      currentImageBase64 = data.image;
      currentPrompt = prompt;

      const img = document.getElementById('generated-image');
      img.src = `data:${data.mimeType};base64,${data.image}`;
      img.style.display = 'block';
      document.getElementById('result-actions').style.display = 'flex';
      showStatus('gen-status', 'success', '✅ Image generated successfully!');
    } catch (e) {
      showStatus('gen-status', 'error', '❌ ' + e.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '✨ Generate';
    }
  }

  // ===== SAVE =====
  async function saveResult() {
    if (!currentImageBase64 || !currentPrompt) return;
    showStatus('save-status', 'info', '💾 Saving...');
    try {
      const res = await fetch(S3 + '/history', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt: currentPrompt,
          image: currentImageBase64,
          mimeType: 'image/jpeg',
          model: 'imagen-3.0-generate-001'
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Save failed');
      showStatus('save-status', 'success', '✅ Saved! ID: ' + data.id);
      loadHistory();
    } catch (e) {
      showStatus('save-status', 'error', '❌ ' + e.message);
    }
  }

  // ===== HISTORY =====
  async function loadHistory() {
    const grid = document.getElementById('history-grid');
    grid.innerHTML = '<div class="empty-state"><span class="loader"></span> Loading...</div>';
    try {
      const res = await fetch(S3 + '/history');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');

      if (!data.length) {
        grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No saved results yet</p></div>';
        return;
      }

      grid.innerHTML = data.map(item => `
        <div class="history-item" id="item-${item.id}">
          ${item.imageUrl
            ? `<img src="${item.imageUrl}" alt="Generated" loading="lazy" onerror="this.parentElement.querySelector('.no-img')&&(this.style.display='none')"/>`
            : `<div class="no-img">🖼️</div>`
          }
          <div class="history-item-info">
            <p>${item.prompt.length > 80 ? item.prompt.substring(0,80) + '...' : item.prompt}</p>
            <p class="date">🕐 ${new Date(item.createdAt).toLocaleString()}</p>
            <button class="btn btn-red" onclick="deleteItem('${item.id}')">🗑️ Delete</button>
          </div>
        </div>
      `).join('');
    } catch (e) {
      grid.innerHTML = `<div class="status-msg error" style="display:block">❌ ${e.message}</div>`;
    }
  }

  async function deleteItem(id) {
    if (!confirm('Delete this item?')) return;
    try {
      const res = await fetch('https://crud-service-180225892893.us-central1.run.app/api/history/' + id, { method: 'DELETE' });
      if (!res.ok) throw new Error('Delete failed');
      document.getElementById('item-' + id)?.remove();
      const grid = document.getElementById('history-grid');
      if (!grid.children.length) {
        grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>No saved results yet</p></div>';
      }
    } catch (e) {
      alert('Error: ' + e.message);
    }
  }

  // ===== INIT =====
  initMap();
  fetchWeather(null, null, null);
  loadHistory();
</script>
</body>
</html>
